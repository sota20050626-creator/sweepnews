<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweepnews — AI自動ニュース</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f7f7f5; color: #1a1a1a; font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 0 2rem; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500; letter-spacing: 0.06em; color: #111; }
    .logo span { color: #10b981; }
    .header-date { font-size: 0.75rem; color: #999; font-family: 'DM Mono', monospace; }
    .genre-bar { background: #fff; border-bottom: 1px solid #e8e8e8; overflow-x: auto; scrollbar-width: none; }
    .genre-bar::-webkit-scrollbar { display: none; }
    .genre-tabs { display: flex; padding: 0 2rem; width: max-content; min-width: 100%; }
    .genre-tab { padding: 0.7rem 0.9rem; font-size: 0.76rem; font-weight: 500; cursor: pointer; border: none; background: none; color: #888; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif; }
    .genre-tab:hover { color: #333; }
    .genre-tab.active { color: #10b981; border-bottom-color: #10b981; }
    .stats-bar { max-width: 1100px; margin: 0 auto; padding: 1rem 2rem; display: flex; gap: 2rem; align-items: center; }
    .stat { display: flex; flex-direction: column; gap: 0.1rem; }
    .stat-value { font-family: 'DM Mono', monospace; font-size: 1.3rem; color: #111; line-height: 1; }
    .stat-label { font-size: 0.65rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-divider { width: 1px; height: 1.8rem; background: #e8e8e8; }
    main { max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; }
    .news-list { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; }
    .news-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid #f0f0f0; text-decoration: none; color: inherit; transition: background 0.1s; }
    .news-row:last-child { border-bottom: none; }
    .news-row:hover { background: #f9f9f9; }
    .row-genre { font-size: 0.68rem; font-weight: 700; padding: 0.2rem 0.5rem; background: #f0fdf4; color: #10b981; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .row-title { font-size: 0.88rem; font-weight: 500; color: #111; line-height: 1.5; flex: 1; }
    .row-source { font-size: 0.65rem; color: #bbb; font-family: 'DM Mono', monospace; white-space: nowrap; flex-shrink: 0; }
    .row-time { font-size: 0.65rem; color: #ccc; white-space: nowrap; flex-shrink: 0; min-width: 48px; text-align: right; }
    .row-arrow { font-size: 0.75rem; color: #10b981; flex-shrink: 0; }
    .center-msg { text-align: center; padding: 5rem 2rem; color: #aaa; font-size: 0.85rem; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #e8e8e8; border-top-color: #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.8rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #topBtn { position: fixed; bottom: 2rem; right: 2rem; width: 40px; height: 40px; border-radius: 50%; background: #10b981; color: #fff; border: none; font-size: 1.1rem; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 200; }
    #topBtn:hover { transform: translateY(-2px); }
    footer { border-top: 1px solid #e8e8e8; padding: 1.5rem 2rem; text-align: center; font-size: 0.68rem; color: #bbb; font-family: 'DM Mono', monospace; }
    @media (max-width: 600px) { .row-source, .row-time { display: none; } .stats-bar { gap: 1rem; } }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">SWEEP<span>news</span></div>
    <div class="header-date" id="headerDate"></div>
  </div>
</header>
<div class="genre-bar">
  <div class="genre-tabs" id="genreTabs">
    <button class="genre-tab active" onclick="filterGenre('all', this)">🌐 すべて</button>
  </div>
</div>
<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat"><div class="stat-value" id="statTotal">—</div><div class="stat-label">収集記事</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-value" id="statGenres">—</div><div class="stat-label">ジャンル</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-value" id="statSources">—</div><div class="stat-label">ソース数</div></div>
</div>
<main><div id="content"><div class="center-msg"><div class="spinner"></div><br>読み込み中...</div></div></main>
<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<footer>SWEEPNEWS — 毎朝6時 JST 自動更新</footer>
<script>
  const GENRE_ORDER = ['ai_tech','business','finance','world_news','japan','science','health','environment','gaming_esports','entertainment','dev_tools','other'];
  let allItems = [];

  function formatTime(iso) {
    try {
      const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
      if (diff < 60) return diff + '分前';
      if (diff < 1440) return Math.floor(diff/60) + '時間前';
      return Math.floor(diff/1440) + '日前';
    } catch { return ''; }
  }

  function row(item) {
    return '<a class="news-row" href="' + item.url + '" target="_blank" rel="noopener">' +
      '<span class="row-genre">' + (item.genre_label || item.genre || '') + '</span>' +
      '<span class="row-title">' + (item.title_ja || item.title) + '</span>' +
      '<span class="row-source">' + item.source + '</span>' +
      '<span class="row-time">' + formatTime(item.published) + '</span>' +
      '<span class="row-arrow">↗</span></a>';
  }

  function filterGenre(genre, el) {
    document.querySelectorAll('.genre-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const items = genre === 'all' ? allItems : allItems.filter(i => i.genre === genre);
    document.getElementById('content').innerHTML = items.length
      ? '<div class="news-list">' + items.map(row).join('') + '</div>'
      : '<div class="center-msg">記事が見つかりません</div>';
  }

  async function load() {
    const d = new Date();
    const today = d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' + String(d.getUTCDate()).padStart(2,'0');
    document.getElementById('headerDate').textContent = today;
    let data = null;
    for (let i = 0; i < 2; i++) {
      const dt = new Date(); dt.setUTCDate(dt.getUTCDate() - i);
      const date = dt.getUTCFullYear() + '-' + String(dt.getUTCMonth()+1).padStart(2,'0') + '-' + String(dt.getUTCDate()).padStart(2,'0');
      try { const r = await fetch('data/daily/' + date + '.json?v=' + Date.now()); if (r.ok) { data = await r.json(); break; } } catch {}
    }
    if (!data) { document.getElementById('content').innerHTML = '<div class="center-msg">データが見つかりません。<br>明日の朝6時以降に自動更新されます。</div>'; return; }
    allItems = data.items || [];
    const gs = data.genre_summary || {};
    document.getElementById('statTotal').textContent = (data.total || allItems.length).toLocaleString();
    document.getElementById('statGenres').textContent = Object.keys(gs).length;
    document.getElementById('statSources').textContent = new Set(allItems.map(i => i.source)).size;
    document.getElementById('statsBar').style.display = 'flex';
    const tabs = document.getElementById('genreTabs');
    const ordered = GENRE_ORDER.filter(g => gs[g]);
    const rest = Object.keys(gs).filter(g => !GENRE_ORDER.includes(g));
    [...ordered, ...rest].forEach(genre => {
      const btn = document.createElement('button');
      btn.className = 'genre-tab';
      btn.textContent = gs[genre].label + ' ' + gs[genre].count;
      btn.onclick = () => filterGenre(genre, btn);
      tabs.appendChild(btn);
    });
    document.getElementById('content').innerHTML = '<div class="news-list">' + allItems.map(row).join('') + '</div>';
  }
  window.addEventListener('scroll', function() {
    document.getElementById('topBtn').style.display = window.scrollY > 300 ? 'flex' : 'none';
  });
  load();
</script>
</body>
</html>
