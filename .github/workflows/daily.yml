name: Sweepnews Daily Update

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日06:00 JST (21:00 UTC)
  workflow_dispatch:        # 手動実行も可能

jobs:
  collect-and-summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests anthropic beautifulsoup4 lxml

      - name: Run collector
        run: python collector.py

      - name: Run summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python summarizer.py

      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily news update $(date +'%Y-%m-%d')" && git push)
